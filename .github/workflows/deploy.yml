name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stempel wersji (commit SHA) w sw.js
        run: sed -i "s/__BUILD__/${GITHUB_SHA::12}/g" sw.js

      - name: Konfiguracja Pages
        uses: actions/configure-pages@v5

      - name: Spakuj pliki apki
        uses: actions/upload-pages-artifact@v3
        with:
          path: .          # katalog główny repo = pliki apki (dostosuj, jeśli są w podfolderze)

      - name: Publikacja
        id: deployment
        uses: actions/deploy-pages@v4
