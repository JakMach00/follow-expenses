<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#15211C">
<link rel="manifest" href="./manifest.json">
<title>Wydatki - domowa księga</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="authScreen" class="auth-wrap" style="display:none;">
  <div class="auth-card">
    <h1>📒 Wydatki</h1>
    <div class="sub">Zaloguj się, żeby zsynchronizować dane między urządzeniami</div>
    <div class="auth-tabs">
      <button id="authTabSignIn" class="active">Zaloguj się</button>
      <button id="authTabSignUp">Nowe konto</button>
    </div>
    <div class="auth-error" id="authError"></div>
    <div class="auth-field"><label>E-mail</label><input type="email" id="authEmail" autocomplete="username" placeholder="ty@example.com"></div>
    <div class="auth-field"><label>Hasło</label><input type="password" id="authPassword" autocomplete="current-password" placeholder="min. 6 znaków"></div>
    <button class="auth-submit" id="authSubmitBtn">Zaloguj się</button>
    <button class="auth-forgot" id="authForgotBtn">Nie pamiętam hasła</button>
  </div>
</div>

<div id="loadingScreen" class="auth-wrap">
  <div class="auth-loading">📒 Wczytywanie…</div>
</div>

<div id="appRoot" class="app" style="display:none;">
  <header class="top">
    <div class="brand">
      <h1><span class="stamp">📒</span> Wydatki</h1>
      <div>
        <div class="ambient" id="ambient"></div>
        <div class="sync-badge"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">-</span></div>
      </div>
    </div>
  </header>
  <main id="view"></main>
  <nav class="tabs" id="tabs">
    <button data-view="add"><span class="ic">➕</span>Dodaj</button>
    <button data-view="month"><span class="ic">🧾</span>Miesiąc</button>
    <button data-view="year"><span class="ic">📊</span>Rok</button>
    <button data-view="settings"><span class="ic">⚙️</span>Ustawienia</button>
  </nav>
</div>

<div id="toast"></div>

<div id="modalOverlay">
  <div class="modal-box">
    <p id="modalMessage"></p>
    <div class="modal-actions">
      <button class="no" id="modalNoBtn">Nie</button>
      <button class="yes" id="modalYesBtn">Usuń</button>
    </div>
  </div>
</div>

<script src="./app.js"></script>

<script type="module" src="./firebase-init.js"></script>
</body>
</html>
