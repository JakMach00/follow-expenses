<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#15211C">
<link rel="manifest" href="./manifest.json">
<title>Wydatki — domowa księga</title>
<style>
  :root{
    --bg:#15211C;
    --surface:#1C2A23;
    --surface-2:#24352C;
    --surface-3:#2C3F34;
    --paper:#F6F1E4;
    --paper-2:#EDE6D2;
    --ink:#EDEAE0;
    --ink-soft:#A8B3AC;
    --ink-faint:#74827A;
    --ink-on-paper:#2B2620;
    --ink-on-paper-soft:#6B6354;
    --accent:#E0982E;
    --accent-soft:#E0982E33;
    --accent-2:#4F9D8C;
    --danger:#C25450;
    --border:rgba(237,234,224,0.10);
    --border-paper:rgba(43,38,32,0.14);
    --font-display:Georgia,'Iowan Old Style','Palatino Linotype',serif;
    --font-body:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    --font-mono:'SF Mono','Cascadia Code',Consolas,'Roboto Mono',monospace;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  button{font-family:inherit;}
  input,select{font-family:inherit;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  /* ---------- Layout ---------- */
  .app{max-width:720px;margin:0 auto;padding:0 16px 100px;}
  header.top{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(to bottom, var(--bg) 80%, transparent);
    padding:18px 0 8px;
  }
  .brand{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px;}
  .brand h1{
    font-family:var(--font-display);
    font-size:26px;font-weight:700;margin:0;letter-spacing:0.2px;
    color:var(--ink);
  }
  .brand h1 .stamp{color:var(--accent);}
  .brand .ambient{font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);text-align:right;line-height:1.3;}
  .brand .ambient b{color:var(--ink);font-size:15px;}

  .sync-badge{
    display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-faint);
    margin-top:3px;justify-content:flex-end;
  }
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);flex-shrink:0;}
  .sync-dot.online{background:var(--accent-2);}
  .sync-dot.pending{background:var(--accent);}

  nav.tabs{display:flex;gap:4px;background:var(--surface);border-radius:12px;padding:4px;border:1px solid var(--border);}
  nav.tabs button{
    flex:1;background:none;border:none;color:var(--ink-soft);
    padding:9px 4px;border-radius:9px;font-size:13.5px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:2px;
    transition:background .15s, color .15s;
  }
  nav.tabs button .ic{font-size:16px;}
  nav.tabs button.active{background:var(--surface-3);color:var(--ink);}
  nav.tabs button:hover:not(.active){color:var(--ink);}

  main{padding-top:14px;}
  .card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:18px;margin-bottom:16px;
  }
  .card h2{font-family:var(--font-display);font-size:18px;margin:0 0 12px;color:var(--ink);}
  .muted{color:var(--ink-soft);font-size:13px;}
  .row{display:flex;gap:10px;align-items:center;}
  .row.between{justify-content:space-between;}
  .grow{flex:1;}

  /* ---------- Quick add ---------- */
  .ledger{
    background:var(--paper);color:var(--ink-on-paper);
    border-radius:var(--radius);padding:20px;
    box-shadow:0 10px 30px -12px rgba(0,0,0,0.5);
    position:relative;
  }
  .ledger::before{
    content:"";position:absolute;top:-6px;left:0;right:0;height:12px;
    background-image:radial-gradient(circle at 10px 6px, transparent 6px, var(--bg) 6.5px);
    background-size:20px 12px;background-repeat:repeat-x;
  }
  .amount-wrap{display:flex;align-items:baseline;gap:8px;justify-content:center;margin:6px 0 18px;}
  .amount-wrap input{
    background:none;border:none;font-family:var(--font-mono);
    font-size:48px;font-weight:600;color:var(--ink-on-paper);
    width:240px;text-align:right;letter-spacing:0.5px;
  }
  .amount-wrap input::placeholder{color:var(--ink-on-paper-soft);}
  .amount-wrap .cur{font-family:var(--font-mono);font-size:22px;color:var(--ink-on-paper-soft);}
  .amount-label{text-align:center;font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-on-paper-soft);margin-bottom:2px;}

  .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  .cat-chip{
    background:var(--paper-2);border:1.5px solid transparent;border-radius:11px;
    padding:9px 4px 7px;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;gap:4px;color:var(--ink-on-paper);text-align:center;
    transition:transform .1s, border-color .15s;
  }
  .cat-chip .ic{font-size:21px;}
  .cat-chip .lbl{font-size:10.5px;line-height:1.15;font-weight:600;}
  .cat-chip.selected{border-color:var(--cat-color, var(--accent));background:#fff;}
  .cat-chip:active{transform:scale(0.96);}

  .sub-panel{margin-top:12px;border-top:1px dashed var(--border-paper);padding-top:12px;}
  .sub-chips{display:flex;flex-wrap:wrap;gap:6px;}
  .sub-chip{
    background:var(--paper-2);border:1.5px solid transparent;border-radius:8px;
    padding:7px 11px;font-size:13px;cursor:pointer;color:var(--ink-on-paper);
  }
  .sub-chip.selected{border-color:var(--cat-color,var(--accent));background:#fff;font-weight:700;}

  .chosen-line{
    margin-top:10px;display:flex;align-items:center;justify-content:space-between;
    background:var(--paper-2);border-radius:9px;padding:8px 12px;font-size:13.5px;
  }
  .chosen-line .pick{font-weight:700;}
  .chosen-line button{background:none;border:none;color:var(--ink-on-paper-soft);text-decoration:underline;cursor:pointer;font-size:12.5px;}

  .meta-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .pill-btn{
    background:var(--paper-2);border:1.5px solid transparent;border-radius:20px;
    padding:7px 13px;font-size:13px;cursor:pointer;color:var(--ink-on-paper);
  }
  .pill-btn.selected{border-color:var(--accent);background:#fff;font-weight:700;}
  .date-input{
    background:var(--paper-2);border:1.5px solid transparent;border-radius:20px;
    padding:6px 12px;font-size:13px;color:var(--ink-on-paper);
  }
  .note-input{
    width:100%;margin-top:10px;background:var(--paper-2);border:1.5px solid transparent;
    border-radius:9px;padding:10px 12px;font-size:14px;color:var(--ink-on-paper);
  }
  .note-input::placeholder{color:var(--ink-on-paper-soft);}

  .save-btn{
    width:100%;margin-top:16px;background:var(--accent);color:#241400;border:none;
    border-radius:11px;padding:14px;font-size:15.5px;font-weight:700;cursor:pointer;
    letter-spacing:0.2px;transition:filter .15s;
  }
  .save-btn:disabled{opacity:0.45;cursor:not-allowed;}
  .save-btn:not(:disabled):hover{filter:brightness(1.07);}
  .cancel-edit{
    width:100%;margin-top:8px;background:none;border:none;color:var(--ink-on-paper-soft);
    text-decoration:underline;cursor:pointer;font-size:13px;padding:4px;
  }

  /* ---------- Recent list / receipts ---------- */
  .tx-row{
    display:flex;align-items:center;gap:10px;padding:10px 0;
    border-bottom:1px dotted var(--border);cursor:pointer;
  }
  .tx-row:last-child{border-bottom:none;}
  .tx-ic{
    width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-size:16px;flex-shrink:0;
  }
  .tx-main{flex:1;min-width:0;}
  .tx-sub{font-size:14px;font-weight:600;color:var(--ink);}
  .tx-meta{font-size:12px;color:var(--ink-faint);}
  .tx-amount{font-family:var(--font-mono);font-size:15px;font-weight:600;color:var(--ink);white-space:nowrap;}
  .tx-del{background:none;border:none;color:var(--ink-faint);font-size:16px;cursor:pointer;padding:8px 8px;line-height:1;}
  .tx-del:hover{color:var(--danger);}
  .empty-state{text-align:center;padding:30px 10px;color:var(--ink-soft);font-size:14px;}
  .empty-state .ic{font-size:30px;display:block;margin-bottom:8px;}

  /* ---------- Month / year nav ---------- */
  .period-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .period-nav button{
    background:var(--surface-2);border:1px solid var(--border);color:var(--ink);
    width:36px;height:36px;border-radius:9px;font-size:16px;cursor:pointer;
  }
  .period-nav .label{font-family:var(--font-display);font-size:20px;text-transform:capitalize;}

  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:4px;}
  .stat-box{background:var(--surface-2);border-radius:11px;padding:12px 14px;}
  .stat-box .v{font-family:var(--font-mono);font-size:19px;font-weight:600;}
  .stat-box .l{font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.6px;margin-top:2px;}
  .delta-up{color:var(--danger);}
  .delta-down{color:var(--accent-2);}

  .donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .cat-list{flex:1;min-width:200px;display:flex;flex-direction:column;gap:8px;}
  .cat-list-row{display:flex;align-items:center;gap:9px;font-size:13.5px;}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .cat-list-row .name{flex:1;color:var(--ink);}
  .cat-list-row .pct{color:var(--ink-faint);font-size:12px;width:38px;text-align:right;}
  .cat-list-row .amt{font-family:var(--font-mono);font-weight:600;width:78px;text-align:right;}

  .budget-ring-wrap{position:relative;width:120px;height:120px;flex-shrink:0;}
  .budget-ring-wrap .ring-text{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .budget-ring-wrap .ring-text .pct{font-family:var(--font-mono);font-size:20px;font-weight:700;}
  .budget-ring-wrap .ring-text .lbl{font-size:10px;color:var(--ink-soft);text-align:center;line-height:1.2;}

  .day-header{
    font-size:12.5px;color:var(--ink-faint);text-transform:capitalize;
    margin:16px 0 4px;letter-spacing:0.3px;
  }
  .day-header:first-of-type{margin-top:6px;}

  /* ---------- Year bars ---------- */
  .bar-chart{display:flex;align-items:flex-end;gap:5px;height:140px;margin:6px 0 4px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;}
  .bar{width:100%;border-radius:5px 5px 2px 2px;background:var(--accent);min-height:2px;transition:height .3s;}
  .bar.current{background:var(--accent-2);}
  .bar-col .m-lbl{font-size:10.5px;color:var(--ink-faint);margin-top:6px;}

  table.cat-table{width:100%;border-collapse:collapse;margin-top:6px;font-size:13.5px;}
  table.cat-table td{padding:7px 0;border-bottom:1px dotted var(--border);}
  table.cat-table td.amt{font-family:var(--font-mono);text-align:right;font-weight:600;}
  table.cat-table .bar-mini{height:5px;border-radius:3px;background:var(--surface-3);margin-top:4px;overflow:hidden;}
  table.cat-table .bar-mini i{display:block;height:100%;border-radius:3px;}

  /* ---------- Settings ---------- */
  .settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:12px;}
  .settings-row:last-child{border-bottom:none;}
  .settings-row .t{font-size:14.5px;font-weight:600;}
  .settings-row .d{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .btn{
    background:var(--surface-2);border:1px solid var(--border);color:var(--ink);
    border-radius:9px;padding:9px 14px;font-size:13.5px;cursor:pointer;white-space:nowrap;
  }
  .btn:hover{background:var(--surface-3);}
  .btn.danger{color:var(--danger);border-color:var(--danger);}
  .btn.danger:hover{background:rgba(194,84,80,0.12);}
  .btn.accent{background:var(--accent);color:#241400;border:none;font-weight:700;}
  .num-input{
    background:var(--surface-2);border:1px solid var(--border);color:var(--ink);
    border-radius:9px;padding:9px 12px;font-size:14px;width:110px;font-family:var(--font-mono);
  }
  input[type=file]{display:none;}

  /* ---------- Toast ---------- */
  #toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--surface-3);color:var(--ink);border:1px solid var(--border);
    padding:11px 18px;border-radius:11px;font-size:13.5px;opacity:0;
    transition:opacity .25s, transform .25s;pointer-events:none;z-index:50;
    box-shadow:0 8px 24px -8px rgba(0,0,0,0.5);max-width:90vw;text-align:center;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- Custom confirm modal (replaces broken native confirm()) ---------- */
  #modalOverlay{
    position:fixed;inset:0;background:rgba(10,15,12,0.65);z-index:60;
    display:none;align-items:center;justify-content:center;padding:20px;
  }
  #modalOverlay.show{display:flex;}
  .modal-box{
    background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);
    padding:22px;max-width:340px;width:100%;box-shadow:0 20px 50px -10px rgba(0,0,0,0.6);
  }
  .modal-box p{margin:0 0 18px;font-size:14.5px;color:var(--ink);line-height:1.5;}
  .modal-actions{display:flex;gap:10px;}
  .modal-actions button{flex:1;padding:11px;border-radius:9px;font-size:14px;cursor:pointer;border:none;}
  .modal-actions .no{background:var(--surface-3);color:var(--ink);}
  .modal-actions .yes{background:var(--danger);color:#fff;font-weight:700;}

  /* ---------- Auth screen ---------- */
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .auth-card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:28px 26px;max-width:360px;width:100%;
  }
  .auth-card h1{font-family:var(--font-display);font-size:25px;margin:0 0 4px;text-align:center;}
  .auth-card .sub{text-align:center;color:var(--ink-soft);font-size:13px;margin-bottom:22px;}
  .auth-tabs{display:flex;gap:4px;background:var(--surface-2);border-radius:10px;padding:3px;margin-bottom:18px;}
  .auth-tabs button{flex:1;background:none;border:none;color:var(--ink-soft);padding:8px;border-radius:7px;font-size:13.5px;cursor:pointer;}
  .auth-tabs button.active{background:var(--surface-3);color:var(--ink);font-weight:600;}
  .auth-field{margin-bottom:12px;}
  .auth-field label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:5px;}
  .auth-field input{
    width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--ink);
    border-radius:9px;padding:10px 12px;font-size:14.5px;
  }
  .auth-error{
    background:rgba(194,84,80,0.12);border:1px solid var(--danger);color:#F0B3B0;
    border-radius:9px;padding:9px 12px;font-size:13px;margin-bottom:12px;display:none;
  }
  .auth-error.show{display:block;}
  .auth-submit{
    width:100%;background:var(--accent);color:#241400;border:none;border-radius:10px;
    padding:13px;font-size:14.5px;font-weight:700;cursor:pointer;margin-top:6px;
  }
  .auth-submit:disabled{opacity:0.5;cursor:not-allowed;}
  .auth-forgot{display:block;text-align:center;margin-top:14px;font-size:12.5px;color:var(--ink-soft);background:none;border:none;cursor:pointer;text-decoration:underline;}
  .auth-loading{text-align:center;color:var(--ink-soft);font-size:14px;padding:40px 0;}

  @media (max-width:420px){
    .amount-wrap input{font-size:38px;width:180px;}
    .cat-grid{grid-template-columns:repeat(3,1fr);}
    .brand h1{font-size:22px;}
  }
</style>
</head>
<body>

<div id="authScreen" class="auth-wrap" style="display:none;">
  <div class="auth-card">
    <h1>📒 Wydatki</h1>
    <div class="sub">Zaloguj się, żeby zsynchronizować dane między urządzeniami</div>
    <div class="auth-tabs">
      <button id="authTabSignIn" class="active">Zaloguj się</button>
      <button id="authTabSignUp">Nowe konto</button>
    </div>
    <div class="auth-error" id="authError"></div>
    <div class="auth-field"><label>E-mail</label><input type="email" id="authEmail" autocomplete="username" placeholder="ty@example.com"></div>
    <div class="auth-field"><label>Hasło</label><input type="password" id="authPassword" autocomplete="current-password" placeholder="min. 6 znaków"></div>
    <button class="auth-submit" id="authSubmitBtn">Zaloguj się</button>
    <button class="auth-forgot" id="authForgotBtn">Nie pamiętam hasła</button>
  </div>
</div>

<div id="loadingScreen" class="auth-wrap">
  <div class="auth-loading">📒 Wczytywanie…</div>
</div>

<div id="appRoot" class="app" style="display:none;">
  <header class="top">
    <div class="brand">
      <h1><span class="stamp">📒</span> Wydatki</h1>
      <div>
        <div class="ambient" id="ambient"></div>
        <div class="sync-badge"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">—</span></div>
      </div>
    </div>
    <nav class="tabs" id="tabs">
      <button data-view="add"><span class="ic">➕</span>Dodaj</button>
      <button data-view="month"><span class="ic">🧾</span>Miesiąc</button>
      <button data-view="year"><span class="ic">📊</span>Rok</button>
      <button data-view="settings"><span class="ic">⚙️</span>Ustawienia</button>
    </nav>
  </header>
  <main id="view"></main>
</div>

<div id="toast"></div>

<div id="modalOverlay">
  <div class="modal-box">
    <p id="modalMessage"></p>
    <div class="modal-actions">
      <button class="no" id="modalNoBtn">Nie</button>
      <button class="yes" id="modalYesBtn">Usuń</button>
    </div>
  </div>
</div>

<script>
/* =====================================================================
   AppCore — all UI / state / rendering logic, independent of Firebase.
   Talks to the outside world only through the `dataLayer` object passed
   into AppCore.init(dataLayer). This makes it possible to swap in a fake
   dataLayer for testing without touching Firebase at all.

   dataLayer contract (all required):
     onExpenses(cb)      -> cb(array of {id, amount, catId, sub, date, note, createdAt}); returns unsubscribe()
     addExpense(data)    -> Promise
     updateExpense(id,data) -> Promise
     deleteExpense(id)   -> Promise
     onBudget(cb)        -> cb(numberOrNull); returns unsubscribe()
     setBudget(value)    -> Promise
     onConnection(cb)    -> cb({online:boolean, pendingWrites:boolean}); returns unsubscribe()
     signOut()           -> Promise
   ===================================================================== */
window.AppCore = (function(){
"use strict";

const CATEGORIES = [
  {id:'spozywcze',  name:'Spożywcze',              icon:'🛒', color:'#6B9B6E', subs:['Zakupy spożywcze','Warzywa i owoce','Mięso i ryby','Pieczywo i nabiał','Napoje','Alkohol']},
  {id:'restauracje',name:'Restauracje i jedzenie',  icon:'🍽️', color:'#D9772E', subs:['Restauracja','Fast food','Kawiarnia / kawa','Dowóz jedzenia','Bar / klub']},
  {id:'transport',  name:'Transport',               icon:'🚗', color:'#4F9D8C', subs:['Paliwo','Komunikacja miejska','Taxi / Uber / Bolt','Serwis i naprawy','Parking','Myjnia','Raty / leasing auta']},
  {id:'dom',        name:'Dom i mieszkanie',        icon:'🏠', color:'#9C6B9E', subs:['Czynsz / kredyt','Prąd','Gaz','Woda','Internet i TV','Telefon','Wyposażenie domu','Środki czystości','Remont i naprawy','Meble']},
  {id:'elektronika',name:'Elektronika',             icon:'💻', color:'#4A7FB5', subs:['Komputer / laptop','Telefon / smartfon','RTV / AGD','Akcesoria komputerowe','Podzespoły PC','Gry komputerowe (cyfrowe)','Serwis elektroniki']},
  {id:'zdrowie',    name:'Zdrowie i uroda',         icon:'💊', color:'#C2587A', subs:['Lekarz','Leki','Dentysta','Siłownia / sport','Kosmetyki','Fryzjer / barber','Suplementy']},
  {id:'odziez',     name:'Odzież i akcesoria',      icon:'👕', color:'#B58C4A', subs:['Ubrania','Buty','Akcesoria','Pranie / czyszczenie']},
  {id:'hobby',      name:'Hobby i rozrywka',        icon:'🎮', color:'#7C5CBF', subs:['Airsoft','Gry i konsole','Subskrypcje (streaming)','Kino','Koncerty i wydarzenia','Fotografia','Książki','Sprzęt PC do gier','Inne hobby']},
  {id:'edukacja',   name:'Edukacja i rozwój',       icon:'📚', color:'#3E8C7E', subs:['Kursy online','Książki edukacyjne','Szkolenia / certyfikaty','Studia / czesne']},
  {id:'finanse',    name:'Finanse i opłaty',        icon:'💰', color:'#2E8B57', subs:['Opłaty bankowe','Ubezpieczenia','Podatki','Prowizje maklerskie','Spłata długów','Inne opłaty finansowe']},
  {id:'podroze',    name:'Podróże',                 icon:'🧳', color:'#C97B4A', subs:['Bilety (lot / kolej)','Nocleg / hotel','Wycieczki i atrakcje','Wynajem auta','Wyżywienie w podróży']},
  {id:'inne',       name:'Inne',                    icon:'📦', color:'#8C8C8C', subs:['Prezenty','Darowizny','Zwierzęta domowe','Dzieci','Nieprzewidziane','Pozostałe']},
];
const CAT_BY_ID = {}; CATEGORIES.forEach(c=>CAT_BY_ID[c.id]=c);

const MONTHS_NOM = ['styczeń','luty','marzec','kwiecień','maj','czerwiec','lipiec','sierpień','wrzesień','październik','listopad','grudzień'];
const MONTHS_GEN = ['stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia','września','października','listopada','grudnia'];
const WEEKDAYS   = ['niedziela','poniedziałek','wtorek','środa','czwartek','piątek','sobota'];

let dataLayer = null;
let unsubExpenses = null, unsubBudget = null, unsubConn = null;

const today = new Date();
const state = {
  expenses: [],
  budget: null,
  connection: {online:true, pendingWrites:false},
  view: 'add',
  selCatId: null,
  selSub: null,
  selDate: ymd(today),
  editId: null,
  cursor: { y: today.getFullYear(), m: today.getMonth() },
  yearCursor: today.getFullYear(),
};

/* ============ HELPERS ============ */
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseYmd(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtMoney(n){
  if(isNaN(n)) n = 0;
  return n.toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' zł';
}
function parseAmountInput(str){
  if(!str) return NaN;
  const cleaned = String(str).replace(/\s/g,'').replace(',', '.');
  return parseFloat(cleaned);
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let toastTimer=null;
function showToast(msg){
  const el = document.getElementById('toast');
  if(!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2200);
}

/* Custom confirm modal — replaces native confirm(), which is silently
   blocked in some embedded/mobile webview contexts. */
function showConfirm(message, onYes){
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalMessage').textContent = message;
  overlay.classList.add('show');
  const yesBtn = document.getElementById('modalYesBtn');
  const noBtn = document.getElementById('modalNoBtn');
  function cleanup(){
    overlay.classList.remove('show');
    yesBtn.removeEventListener('click', onYesClick);
    noBtn.removeEventListener('click', onNoClick);
    overlay.removeEventListener('click', onOverlayClick);
  }
  function onYesClick(){ cleanup(); onYes(); }
  function onNoClick(){ cleanup(); }
  function onOverlayClick(e){ if(e.target===overlay) cleanup(); }
  yesBtn.addEventListener('click', onYesClick);
  noBtn.addEventListener('click', onNoClick);
  overlay.addEventListener('click', onOverlayClick);
}

function monthExpenses(y,m){
  return state.expenses.filter(e=>{
    const d = parseYmd(e.date);
    return d.getFullYear()===y && d.getMonth()===m;
  });
}
function yearExpenses(y){
  return state.expenses.filter(e=> parseYmd(e.date).getFullYear()===y);
}
function sum(arr){ return arr.reduce((a,e)=>a+e.amount,0); }

function catTotals(list){
  const map = {};
  list.forEach(e=>{ map[e.catId] = (map[e.catId]||0) + e.amount; });
  return Object.keys(map).map(id=>({id, color:(CAT_BY_ID[id]||{}).color||'#888', name:(CAT_BY_ID[id]||{}).name||'Inne', total:map[id]}))
    .sort((a,b)=>b.total-a.total);
}

/* ============ RENDER: ROOT ============ */
function render(){
  document.querySelectorAll('#tabs button').forEach(b=>{
    b.classList.toggle('active', b.dataset.view === state.view);
  });
  const thisMonthTotal = sum(monthExpenses(today.getFullYear(), today.getMonth()));
  document.getElementById('ambient').innerHTML = 'w tym miesiącu<br><b>'+fmtMoney(thisMonthTotal)+'</b>';

  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if(dot && lbl){
    if(!state.connection.online){ dot.className='sync-dot'; lbl.textContent='offline — czeka na sieć'; }
    else if(state.connection.pendingWrites){ dot.className='sync-dot pending'; lbl.textContent='synchronizowanie…'; }
    else { dot.className='sync-dot online'; lbl.textContent='zsynchronizowano'; }
  }

  const v = document.getElementById('view');
  if(state.view==='add') v.innerHTML = renderAdd();
  else if(state.view==='month') v.innerHTML = renderMonth();
  else if(state.view==='year') v.innerHTML = renderYear();
  else if(state.view==='settings') v.innerHTML = renderSettings();
  attachHandlers();
}

/* ============ RENDER: ADD ============ */

    </button>`).join('');

  let subPanel = '';

    subPanel = `<div class="sub-panel"><div class="sub-chips">` +
      selCat.subs.map(s=>`<button class="sub-chip" style="--cat-color:${selCat.color}" data-act="picksub" data-sub="${escapeHtml(s)}">${escapeHtml(s)}</button>`).join('') +
      `</div></div>`;
  } else if(selCat && state.selSub){
    subPanel = `<div class="chosen-line">

      <button data-act="changecat">zmień</button>
    </div>`;
  }

  const amountVal = state._amountDraft || '';
  const noteVal = state._noteDraft || '';
  const canSave = (parseAmountInput(amountVal) > 0) && state.selSub;

  return `
  <div class="ledger">
    <div class="amount-label">Ile wydałeś?</div>
    <div class="amount-wrap">
      <input id="amountInput" type="text" inputmode="decimal" placeholder="0,00" value="${escapeHtml(amountVal)}" autocomplete="off">
      <span class="cur">zł</span>
    </div>
    <div class="cat-grid">${catGrid}</div>
    ${subPanel}
    <div class="meta-row">
      <button class="pill-btn ${isToday?'selected':''}" data-act="setdate" data-val="${ymd(today)}">Dziś</button>
      <button class="pill-btn ${isYest?'selected':''}" data-act="setdate" data-val="${ymd(yest)}">Wczoraj</button>
      <input class="date-input" id="dateInput" type="date" value="${state.selDate}">
    </div>
    <input class="note-input" id="noteInput" type="text" placeholder="Notatka (opcjonalnie)" value="${escapeHtml(noteVal)}" maxlength="120">
    <button class="save-btn" id="saveBtn" ${canSave?'':'disabled'}>${state.editId ? 'Zapisz zmiany' : 'Zapisz wydatek'}</button>
    ${state.editId ? '<button class="cancel-edit" id="cancelEditBtn">Anuluj edycję</button>' : ''}
  </div>

}

function renderRecent(){
  const recent = [...state.expenses].sort((a,b)=> (b.date+'_'+b.createdAt) > (a.date+'_'+a.createdAt) ? 1 : -1).slice(0,8);
  if(recent.length===0){
    return `<div class="card"><div class="empty-state"><span class="ic">🧾</span>Brak zapisanych wydatków.<br>Dodaj pierwszy powyżej.</div></div>`;
  }
  return `<div class="card"><h2>Ostatnie wpisy</h2>${recent.map(rowHtml).join('')}</div>`;
}

function rowHtml(e){
  const c = CAT_BY_ID[e.catId] || {icon:'📦', color:'#888', name:'Inne'};
  const d = parseYmd(e.date);
  const dateLbl = d.getDate()+' '+MONTHS_GEN[d.getMonth()];
  return `<div class="tx-row" data-act="editrow" data-id="${e.id}">
    <div class="tx-ic" style="background:${c.color}33;color:${c.color}">${c.icon}</div>
    <div class="tx-main">
      <div class="tx-sub">${escapeHtml(e.sub)}</div>
      <div class="tx-meta">${dateLbl}${e.note ? ' · '+escapeHtml(e.note) : ''}</div>
    </div>
    <div class="tx-amount">${fmtMoney(e.amount)}</div>
    <button class="tx-del" data-act="delrow" data-id="${e.id}" title="Usuń" aria-label="Usuń">✕</button>
  </div>`;
}

/* ============ RENDER: MONTH ============ */
function renderMonth(){
  const {y,m} = state.cursor;
  const list = monthExpenses(y,m).sort((a,b)=> a.date===b.date ? 0 : (a.date<b.date?1:-1));
  const total = sum(list);

  const prevD = new Date(y,m-1,1); const prevTotal = sum(monthExpenses(prevD.getFullYear(), prevD.getMonth()));
  let deltaHtml = '';
  if(prevTotal>0){
    const diff = ((total-prevTotal)/prevTotal)*100;
    const cls = diff>0 ? 'delta-up' : 'delta-down';
    const arrow = diff>0 ? '↑' : '↓';
    deltaHtml = `<span class="${cls}">${arrow} ${Math.abs(diff).toFixed(0)}%</span> vs poprz. miesiąc`;
  }

  const days = new Set(list.map(e=>e.date)).size;
  const avgDay = days>0 ? total/days : 0;

  const cats = catTotals(list);
  const topCat = cats[0];

  let budgetRing = '';
  if(state.budget && state.budget>0){
    const pct = Math.min(total/state.budget,1.4);
    const ringColor = pct<0.8 ? '#4F9D8C' : (pct<=1 ? '#E0982E' : '#C25450');
    budgetRing = donutRing(Math.min(pct,1), ringColor, Math.round(Math.min(pct,9.99)*100)+'%', fmtMoney(state.budget)+' budżet');
  }

  const catRows = cats.map(c=>{
    const pct = total>0 ? (c.total/total*100) : 0;
    return `<div class="cat-list-row"><span class="dot" style="background:${c.color}"></span><span class="name">${escapeHtml(c.name)}</span><span class="pct">${pct.toFixed(0)}%</span><span class="amt">${fmtMoney(c.total)}</span></div>`;
  }).join('');

  let listHtml = '';
  let lastDate = null;
  list.forEach(e=>{
    if(e.date !== lastDate){
      const d = parseYmd(e.date);
      listHtml += `<div class="day-header">${WEEKDAYS[d.getDay()]}, ${d.getDate()} ${MONTHS_GEN[d.getMonth()]}</div>`;
      lastDate = e.date;
    }
    listHtml += rowHtml(e);
  });
  if(list.length===0) listHtml = `<div class="empty-state"><span class="ic">📭</span>Brak wydatków w tym miesiącu.</div>`;

  return `
  <div class="period-nav">
    <button data-act="monthnav" data-dir="-1">‹</button>
    <div class="label">${MONTHS_NOM[m]} ${y}</div>
    <button data-act="monthnav" data-dir="1">›</button>
  </div>
  <div class="card">
    <div class="stat-grid">
      <div class="stat-box"><div class="v">${fmtMoney(total)}</div><div class="l">Suma wydatków</div></div>
      <div class="stat-box"><div class="v">${fmtMoney(avgDay)}</div><div class="l">Średnio / dzień</div></div>
    </div>
    <div class="muted" style="margin-top:8px;">${deltaHtml || 'Brak danych z poprzedniego miesiąca'}${topCat ? ' · najwięcej: '+escapeHtml(topCat.name) : ''}</div>
  </div>
  <div class="card">
    <h2>Podział na kategorie</h2>
    <div class="donut-wrap">
      ${cats.length ? donutChart(cats) : ''}
      <div class="cat-list">${catRows || '<div class="muted">Brak danych.</div>'}</div>
      ${budgetRing}
    </div>
  </div>
  <div class="card">
    <h2>Wpisy</h2>
    ${listHtml}
  </div>
  `;
}

function donutChart(cats){
  const size=110, stroke=16, r=(size-stroke)/2, c=size/2, circ=2*Math.PI*r;
  const total = cats.reduce((a,x)=>a+x.total,0);
  let offset=0;
  const circles = cats.map(cat=>{
    const frac = total>0 ? cat.total/total : 0;
    const dash = frac*circ;
    const html = `<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${cat.color}" stroke-width="${stroke}" stroke-dasharray="${dash.toFixed(2)} ${(circ-dash).toFixed(2)}" stroke-dashoffset="${(-offset).toFixed(2)}" transform="rotate(-90 ${c} ${c})"/>`;
    offset += dash;
    return html;
  }).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0">${circles}</svg>`;
}

function donutRing(pct, color, pctLabel, subLabel){
  const size=110, stroke=12, r=(size-stroke)/2, c=size/2, circ=2*Math.PI*r;
  const dash = pct*circ;
  return `<div class="budget-ring-wrap">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="var(--surface-3)" stroke-width="${stroke}"/>
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round"
        stroke-dasharray="${dash.toFixed(2)} ${(circ-dash).toFixed(2)}" transform="rotate(-90 ${c} ${c})"/>
    </svg>
    <div class="ring-text"><span class="pct">${pctLabel}</span><span class="lbl">${subLabel}</span></div>
  </div>`;
}

/* ============ RENDER: YEAR ============ */
function renderYear(){
  const y = state.yearCursor;
  const list = yearExpenses(y);
  const total = sum(list);
  const prevTotal = sum(yearExpenses(y-1));
  let deltaHtml = '';
  if(prevTotal>0){
    const diff = ((total-prevTotal)/prevTotal)*100;
    const cls = diff>0 ? 'delta-up' : 'delta-down';
    const arrow = diff>0 ? '↑' : '↓';
    deltaHtml = `<span class="${cls}">${arrow} ${Math.abs(diff).toFixed(0)}%</span> vs ${y-1}`;
  }
  const monthsActive = new Set(list.map(e=>parseYmd(e.date).getMonth())).size;
  const avgMonth = monthsActive>0 ? total/monthsActive : 0;

  const monthTotals = Array.from({length:12},(_,m)=> sum(monthExpenses(y,m)));
  const max = Math.max(...monthTotals, 1);
  const bars = monthTotals.map((v,m)=>{
    const h = Math.max((v/max)*100, v>0?3:0);
    const isCur = (y===today.getFullYear() && m===today.getMonth());
    return `<div class="bar-col">
      <div class="bar ${isCur?'current':''}" style="height:${h}%" title="${MONTHS_NOM[m]}: ${fmtMoney(v)}"></div>
      <div class="m-lbl">${MONTHS_NOM[m].slice(0,3)}</div>
    </div>`;
  }).join('');

  const cats = catTotals(list);
  const catMax = cats.length ? cats[0].total : 1;
  const catRows = cats.map(c=>{
    const pct = total>0 ? (c.total/total*100) : 0;
    const barPct = (c.total/catMax*100);
    return `<tr>
      <td><span class="dot" style="background:${c.color};display:inline-block;margin-right:7px"></span>${escapeHtml(c.name)}
        <div class="bar-mini"><i style="width:${barPct}%;background:${c.color}"></i></div>
      </td>
      <td class="amt">${fmtMoney(c.total)}<br><span class="muted" style="font-size:11px">${pct.toFixed(0)}%</span></td>
    </tr>`;
  }).join('');

  return `
  <div class="period-nav">
    <button data-act="yearnav" data-dir="-1">‹</button>
    <div class="label">Rok ${y}</div>
    <button data-act="yearnav" data-dir="1">›</button>
  </div>
  <div class="card">
    <div class="stat-grid">
      <div class="stat-box"><div class="v">${fmtMoney(total)}</div><div class="l">Suma za rok</div></div>
      <div class="stat-box"><div class="v">${fmtMoney(avgMonth)}</div><div class="l">Średnio / miesiąc</div></div>
    </div>
    <div class="muted" style="margin-top:8px;">${deltaHtml || 'Brak danych z poprzedniego roku'}</div>
  </div>
  <div class="card">
    <h2>Wydatki miesiąc po miesiącu</h2>
    <div class="bar-chart">${bars}</div>
  </div>
  <div class="card">
    <h2>Kategorie w ${y} roku</h2>
    ${cats.length ? `<table class="cat-table">${catRows}</table>` : '<div class="muted">Brak danych dla tego roku.</div>'}
  </div>
  `;
}

/* ============ EVENTS ============ */
function attachHandlers(){
  document.getElementById('tabs').onclick = (ev)=>{
    const btn = ev.target.closest('button[data-view]');
    if(!btn) return;
    if(state.view==='add'){ state._amountDraft = (document.getElementById('amountInput')||{}).value; state._noteDraft = (document.getElementById('noteInput')||{}).value; }
    state.view = btn.dataset.view;
    render();
  };

  const view = document.getElementById('view');
  view.onclick = null; // clear any handler from a previous render to avoid stacking

  if(state.view==='add'){
    const amountEl = document.getElementById('amountInput');
    const noteEl = document.getElementById('noteInput');
    const dateEl = document.getElementById('dateInput');

    amountEl.addEventListener('input', ()=>{ state._amountDraft = amountEl.value; updateSaveState(); });
    amountEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ attemptSave(); } });
    noteEl.addEventListener('input', ()=>{ state._noteDraft = noteEl.value; });
    noteEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ attemptSave(); } });
    dateEl.addEventListener('change', ()=>{ state.selDate = dateEl.value; render(); });

    view.onclick = (ev)=>{
      const t = ev.target.closest('[data-act]');
      if(!t) return;
      const act = t.dataset.act;
      if(act==='pickcat'){
        state._amountDraft = amountEl.value; state._noteDraft = noteEl.value;
        state.selCatId = t.dataset.id; state.selSub = null; render();
      } else if(act==='picksub'){
        state.selSub = t.dataset.sub; render();
        setTimeout(()=>{ const a=document.getElementById('amountInput'); if(a){ a.focus(); a.select(); } },0);
      } else if(act==='changecat'){
        state.selSub = null; render();
      } else if(act==='setdate'){
        state.selDate = t.dataset.val; render();
      } else if(act==='editrow'){
        startEdit(t.dataset.id);
      } else if(act==='delrow'){
        ev.stopPropagation();
        confirmDelete(t.dataset.id);
      }
    };

    document.getElementById('saveBtn').addEventListener('click', attemptSave);
    const cancelBtn = document.getElementById('cancelEditBtn');
    if(cancelBtn) cancelBtn.addEventListener('click', cancelEdit);
  }

  if(state.view==='month'){
    view.querySelector('[data-dir="-1"]').addEventListener('click', ()=>shiftMonth(-1));
    view.querySelector('[data-dir="1"]').addEventListener('click', ()=>shiftMonth(1));
    view.onclick = (ev)=>{
      const t = ev.target.closest('[data-act]');
      if(!t) return;
      if(t.dataset.act==='editrow') startEdit(t.dataset.id);
      else if(t.dataset.act==='delrow'){ ev.stopPropagation(); confirmDelete(t.dataset.id); }
    };
  }

  if(state.view==='year'){
    view.querySelector('[data-dir="-1"]').addEventListener('click', ()=>{ state.yearCursor--; render(); });
    view.querySelector('[data-dir="1"]').addEventListener('click', ()=>{ state.yearCursor++; render(); });
  }

  if(state.view==='settings'){
    document.getElementById('saveBudgetBtn').addEventListener('click', ()=>{
      const v = parseAmountInput(document.getElementById('budgetInput').value);
      const newBudget = (v>0) ? v : null;
      dataLayer.setBudget(newBudget).then(()=>{
        showToast(newBudget ? 'Budżet zapisany' : 'Budżet usunięty');
      }).catch(err=>{ console.error(err); showToast('Nie udało się zapisać budżetu'); });
    });
    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('importBtn').addEventListener('click', ()=> document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change', importData);
    document.getElementById('signOutBtn').addEventListener('click', ()=>{
      showConfirm('Wylogować z tego urządzenia?', ()=>{ dataLayer.signOut(); });
    });
  }
}

function updateSaveState(){
  const amountEl = document.getElementById('amountInput');
  const btn = document.getElementById('saveBtn');
  if(!btn) return;
  const ok = parseAmountInput(amountEl.value) > 0 && state.selSub;
  btn.disabled = !ok;
}

function attemptSave(){
  const amountEl = document.getElementById('amountInput');
  const noteEl = document.getElementById('noteInput');
  const amount = parseAmountInput(amountEl.value);
  if(!(amount>0)){ amountEl.focus(); return; }
  if(!state.selCatId || !state.selSub){ showToast('Wybierz kategorię wydatku'); return; }

  const payload = { amount, catId: state.selCatId, sub: state.selSub, date: state.selDate, note: noteEl.value.trim() };

  if(state.editId){
    const id = state.editId;
    dataLayer.updateExpense(id, payload).then(()=>{
      showToast('Zmiany zapisane');
    }).catch(err=>{ console.error(err); showToast('Nie udało się zapisać zmian'); });
    state.editId = null;
  } else {
    dataLayer.addExpense(Object.assign({createdAt: Date.now()}, payload)).then(()=>{
      showToast('Zapisano: '+fmtMoney(amount)+' — '+state.selSub);
    }).catch(err=>{ console.error(err); showToast('Nie udało się zapisać — sprawdź połączenie'); });
  }

  state._amountDraft = '';
  state._noteDraft = '';
  render();
  setTimeout(()=>{ const a=document.getElementById('amountInput'); if(a) a.focus(); },0);
}

function startEdit(id){
  const ex = state.expenses.find(e=>e.id===id);
  if(!ex) return;
  state.editId = id;
  state.selCatId = ex.catId;
  state.selSub = ex.sub;
  state.selDate = ex.date;
  state._amountDraft = String(ex.amount).replace('.',',');
  state._noteDraft = ex.note || '';
  state.view = 'add';
  render();
  if(typeof window!=='undefined' && window.scrollTo) window.scrollTo({top:0, behavior:'smooth'});
}

function cancelEdit(){
  state.editId = null;
  state.selCatId = null; state.selSub = null;
  state._amountDraft=''; state._noteDraft='';
  state.selDate = ymd(today);
  render();
}

function confirmDelete(id){
  showConfirm('Usunąć ten wydatek? Tej operacji nie można odwrócić.', ()=>{
    dataLayer.deleteExpense(id).then(()=>{
      showToast('Wydatek usunięty');
    }).catch(err=>{ console.error(err); showToast('Nie udało się usunąć — sprawdź połączenie'); });
  });
}

function exportData(){
  const payload = { exportedAt: new Date().toISOString(), budget: state.budget, expenses: state.expenses };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = ymd(today);
  a.href = url; a.download = 'wydatki-eksport-'+stamp+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Wyeksportowano dane');
}

function importData(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      const incoming = Array.isArray(data) ? data : data.expenses;
      if(!Array.isArray(incoming)) throw new Error('Nieprawidłowy format');
      const valid = incoming.filter(e=> e && typeof e.amount==='number' && e.date && e.sub);
      showToast('Importowanie '+valid.length+' wpisów…');
      Promise.all(valid.map(e=> dataLayer.addExpense({
        amount: e.amount, catId: CAT_BY_ID[e.catId] ? e.catId : 'inne',
        sub: e.sub, date: e.date, note: e.note||'', createdAt: e.createdAt || Date.now()
      }))).then(()=>{
        showToast('Zaimportowano '+valid.length+' wpisów');
      }).catch(err=>{ console.error(err); showToast('Część wpisów nie została zaimportowana'); });
    }catch(err){
      console.error(err);
      showToast('Nie udało się odczytać pliku — sprawdź, czy to poprawny eksport.');
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

function shiftMonth(dir){
  let {y,m} = state.cursor;
  m += dir;
  if(m<0){ m=11; y--; } else if(m>11){ m=0; y++; }
  state.cursor = {y,m};
  render();
}

/* ============ INIT / TEARDOWN ============ */
function init(layer){
  dataLayer = layer;
  unsubExpenses = dataLayer.onExpenses(list=>{
    state.expenses = list;
    render();
  });
  unsubBudget = dataLayer.onBudget(val=>{
    state.budget = val;
    render();
  });
  unsubConn = dataLayer.onConnection(info=>{
    state.connection = info;
    render();
  });
  render();
}

function teardown(){
  if(unsubExpenses) unsubExpenses();
  if(unsubBudget) unsubBudget();
  if(unsubConn) unsubConn();
  state.expenses = []; state.budget = null;
  state.selCatId=null; state.selSub=null; state.editId=null; state.view='add';
}

return { init, teardown, _internal: { state, CATEGORIES, fmtMoney, parseAmountInput } };
})();
</script>

<script type="module">
/* =====================================================================
   Firebase glue layer. Builds the `dataLayer` AppCore needs and wires up
   the auth screen. This is the ONLY part of the app that knows about
   Firebase — everything else talks through the dataLayer contract.
   ===================================================================== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword,
  signOut, sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {
  initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
  collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, setDoc, getDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

// ---------------------------------------------------------------------
// Konfiguracja firebase
// ---------------------------------------------------------------------
const firebaseConfig = {
  apiKey: "AIzaSyBP-bJYoK2py4UgqUaabuf04NqOAOaQb0M",
  authDomain: "follow-expenses.firebaseapp.com",
  projectId: "follow-expenses",
  storageBucket: "follow-expenses.firebasestorage.app",
  messagingSenderId: "49363988299",
  appId: "1:49363988299:web:b70d3062774cd2d6a9c2ce"
};

const isConfigured = firebaseConfig.apiKey !== "TWOJ_API_KEY";

const authScreen = document.getElementById('authScreen');
const loadingScreen = document.getElementById('loadingScreen');
const appRoot = document.getElementById('appRoot');

if(!isConfigured){
  loadingScreen.style.display = 'none';
  authScreen.style.display = 'flex';
  authScreen.querySelector('.auth-card').innerHTML = `
    <h1>📒 Wydatki</h1>
    <p style="color:var(--ink-soft);font-size:13.5px;line-height:1.6;">
      Aplikacja nie jest jeszcze połączona z Firebase. Uzupełnij obiekt <code>firebaseConfig</code>
      na początku skryptu (sekcja oznaczona <code>TODO</code>) danymi ze swojego projektu Firebase,
      a potem odśwież stronę.
    </p>`;
} else {
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = initializeFirestore(app, {
    localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
  });

  let currentUid = null;

  function buildDataLayer(uid){
    const expensesCol = collection(db, 'users', uid, 'expenses');
    const settingsDoc = doc(db, 'users', uid, 'meta', 'settings');

    return {
      onExpenses(cb){
        return onSnapshot(expensesCol, snap=>{
          const list = [];
          snap.forEach(d=> list.push(Object.assign({id:d.id}, d.data())));
          cb(list);
        }, err=> console.error('onExpenses error', err));
      },
      addExpense(data){
        return addDoc(expensesCol, data);
      },
      updateExpense(id, data){
        return updateDoc(doc(expensesCol, id), data);
      },
      deleteExpense(id){
        return deleteDoc(doc(expensesCol, id));
      },
      onBudget(cb){
        return onSnapshot(settingsDoc, snap=>{
          cb(snap.exists() ? (snap.data().budget || null) : null);
        }, err=> console.error('onBudget error', err));
      },
      setBudget(value){
        return setDoc(settingsDoc, {budget: value}, {merge:true});
      },
      onConnection(cb){
        // Combine browser online/offline events with Firestore's own
        // "pendingWrites" signal (true while local changes haven't reached the server yet).
        let online = navigator.onLine;
        let pendingWrites = false;
        function emit(){ cb({online, pendingWrites}); }
        const onOnline = ()=>{ online=true; emit(); };
        const onOffline = ()=>{ online=false; emit(); };
        window.addEventListener('online', onOnline);
        window.addEventListener('offline', onOffline);
        const unsubSnap = onSnapshot(expensesCol, {includeMetadataChanges:true}, snap=>{
          pendingWrites = snap.metadata.hasPendingWrites;
          emit();
        }, ()=>{});
        emit();
        return ()=>{ window.removeEventListener('online', onOnline); window.removeEventListener('offline', onOffline); unsubSnap(); };
      },
      signOut(){
        return signOut(auth);
      }
    };
  }

  function showAuthScreen(){
    loadingScreen.style.display = 'none';
    appRoot.style.display = 'none';
    authScreen.style.display = 'flex';
  }
  function showApp(uid){
    authScreen.style.display = 'none';
    loadingScreen.style.display = 'none';
    appRoot.style.display = 'block';
    window.AppCore.init(buildDataLayer(uid));
  }

  onAuthStateChanged(auth, user=>{
    if(user){
      currentUid = user.uid;
      showApp(user.uid);
    } else {
      currentUid = null;
      window.AppCore.teardown();
      showAuthScreen();
    }
  });

  // ---- Auth screen wiring ----
  let authMode = 'signin';
  const tabIn = document.getElementById('authTabSignIn');
  const tabUp = document.getElementById('authTabSignUp');
  const emailEl = document.getElementById('authEmail');
  const pwEl = document.getElementById('authPassword');
  const errEl = document.getElementById('authError');
  const submitBtn = document.getElementById('authSubmitBtn');
  const forgotBtn = document.getElementById('authForgotBtn');

  function setMode(mode){
    authMode = mode;
    tabIn.classList.toggle('active', mode==='signin');
    tabUp.classList.toggle('active', mode==='signup');
    submitBtn.textContent = mode==='signin' ? 'Zaloguj się' : 'Utwórz konto';
    errEl.classList.remove('show');
  }
  tabIn.addEventListener('click', ()=>setMode('signin'));
  tabUp.addEventListener('click', ()=>setMode('signup'));

  function authErrorMessage(code){
    const map = {
      'auth/invalid-email':'Nieprawidłowy adres e-mail.',
      'auth/missing-password':'Wpisz hasło.',
      'auth/weak-password':'Hasło musi mieć przynajmniej 6 znaków.',
      'auth/email-already-in-use':'To konto już istnieje — zaloguj się.',
      'auth/invalid-credential':'Nieprawidłowy e-mail lub hasło.',
      'auth/wrong-password':'Nieprawidłowy e-mail lub hasło.',
      'auth/user-not-found':'Nie znaleziono konta z tym adresem e-mail.',
      'auth/too-many-requests':'Zbyt wiele nieudanych prób — spróbuj za chwilę.',
      'auth/network-request-failed':'Brak połączenia z internetem. Logowanie wymaga sieci przy pierwszym razie na danym urządzeniu.'
    };
    return map[code] || ('Coś nie zadziałało (' + code + ').');
  }

  submitBtn.addEventListener('click', ()=>{
    const email = emailEl.value.trim();
    const pw = pwEl.value;
    errEl.classList.remove('show');
    if(!email || !pw){ errEl.textContent='Wpisz e-mail i hasło.'; errEl.classList.add('show'); return; }
    submitBtn.disabled = true;
    const action = authMode==='signin'
      ? signInWithEmailAndPassword(auth, email, pw)
      : createUserWithEmailAndPassword(auth, email, pw);
    action.catch(err=>{
      errEl.textContent = authErrorMessage(err.code);
      errEl.classList.add('show');
    }).finally(()=>{ submitBtn.disabled = false; });
  });

  forgotBtn.addEventListener('click', ()=>{
    const email = emailEl.value.trim();
    if(!email){ errEl.textContent='Wpisz najpierw swój e-mail powyżej.'; errEl.classList.add('show'); return; }
    sendPasswordResetEmail(auth, email).then(()=>{
      errEl.classList.remove('show');
      const toast = document.getElementById('toast');
      toast.textContent = 'Wysłano e-mail z linkiem do resetu hasła';
      toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'), 3000);
    }).catch(err=>{
      errEl.textContent = authErrorMessage(err.code);
      errEl.classList.add('show');
    });
  });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{ /* offline-first still works without SW, just less robust on first load */ });
}
</script>
